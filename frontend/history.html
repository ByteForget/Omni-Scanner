<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Scanner — History</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --border-soft: #f1f5f9;
            --text: #1e293b;
            --text-2: #64748b;
            --text-3: #94a3b8;
            --purple: #7c3aed;
            --purple-bg: #faf5ff;
            --purple-b: #e9d5ff;
            --amber: #d97706;
            --amber-bg: #fffbeb;
            --amber-b: #fcd34d;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --green: #16a34a;
            --green-bg: #f0fdf4;
            --radius: 14px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 18px rgba(0, 0, 0, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(224, 231, 255, 0.45) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(250, 232, 255, 0.35) 0%, transparent 50%);
            background-attachment: fixed;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-img {
            height: 100px;
            width: auto;
            object-fit: contain;
            display: block;
            margin-top: -10px;
            margin-bottom: -10px;
        }

        nav.nav-menu {
            display: flex;
            gap: 4px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        nav.nav-menu a {
            text-decoration: none;
            color: var(--text-2);
            font-weight: 500;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid transparent;
            transition: all 0.15s;
        }

        nav.nav-menu a:hover {
            color: var(--text);
            background: #f8fafc;
            border-color: var(--border);
        }

        nav.nav-menu a.active {
            color: #7c3aed;
            background: #faf5ff;
            border-color: #e9d5ff;
            font-weight: 600;
        }

        main {
            margin-top: 80px;
            padding: 36px 40px 60px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .heading {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 26px;
        }

        .heading-icon {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ffd166, #ffb703);
            box-shadow: 0 6px 28px rgba(60, 70, 120, 0.1);
            border: 1px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .heading h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .heading p {
            font-size: 0.9rem;
            color: var(--text-2);
            margin-top: 4px;
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 18px 20px;
            margin-bottom: 18px;
        }

        .row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 14px;
            align-items: end;
        }

        .label {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-3);
            margin-bottom: 8px;
        }

        select {
            width: 100%;
            height: 42px;
            border-radius: 10px;
            border: 1.5px solid var(--border);
            background: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            padding: 0 12px;
            outline: none;
        }

        select:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.12);
        }

        .btn {
            height: 42px;
            border-radius: 10px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, #9333ea, #6d28d9);
            color: #fff;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.25);
            transition: transform 0.12s, box-shadow 0.12s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 22px rgba(124, 58, 237, 0.3);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 16px;
            overflow: hidden;
            margin-top: 10px;
        }

        .table th {
            color: #9ba3c2;
            font-size: 13px;
            font-weight: 600;
            border-bottom: 1px solid #e1e5f2;
            padding: 16px 18px;
            text-align: left;
            background: #ffffff;
        }

        .table td {
            padding: 16px 18px;
            border-bottom: 1px solid #f0f2f8;
            color: #1e2340;
            font-weight: 600;
            font-size: 14px;
            background: transparent;
        }

        .table tr:hover td {
            background: rgba(58, 111, 216, 0.03);
        }

        .badge-threat {
            background: var(--red-bg);
            color: var(--red);
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 800;
        }

        .badge-safe {
            background: var(--green-bg);
            color: var(--green);
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 800;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
        }

        .muted {
            color: var(--text-2);
            font-weight: 500;
        }

        @media (max-width: 1100px) {
            nav.nav-menu {
                display: none;
            }

            header {
                padding: 0 20px;
            }

            main {
                padding: 24px 20px;
            }

            .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header>
        <a class="logo-container" href="/">
            <img src="/assets/Logo.png" class="logo-img" alt="Omni Scanner">
        </a>
        <nav class="nav-menu">
            <a href="/">📊 Dashboard</a>
            <a href="/scans">🔍 Scans</a>
            <a href="/history" class="active">🗂️ History</a>
            <a href="/ai">✨ AI Threat Analysis</a>
            <a href="/settings">⚙️ Settings</a>
        </nav>
        <div class="header-actions"></div>
    </header>

    <main>
        <div class="heading">
            <div class="heading-icon">📁</div>
            <div>
                <h1>Scan History Vault</h1>
                <p>Select and load a historical scan profile.</p>
            </div>
        </div>

        <div class="card">
            <div class="row">
                <div>
                    <div class="label">Recent Scan Profiles</div>
                    <select id="reportSelect"></select>
                </div>
                <button class="btn" type="button" onclick="loadSelected()">Load Profile into Dashboard</button>
            </div>
            <div id="status" class="muted" style="margin-top:10px;"></div>
        </div>

        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Date</th>
                        <th style="text-align:right;">Threats</th>
                    </tr>
                </thead>
                <tbody id="rows"></tbody>
            </table>
        </div>
    </main>

    <script>
        const LAST_SCAN_STORAGE_KEY = "omni:last_scan_payload";

        function setStatus(msg) {
            document.getElementById("status").innerText = msg || "";
        }

        function escapeHtml(str) {
            return (str || "").toString()
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll("\"", "&quot;")
                .replaceAll("'", "&#039;");
        }

        async function refresh() {
            setStatus("Loading history…");
            const res = await fetch("/reports");
            if (!res.ok) {
                setStatus("Failed to load history: " + res.status);
                return;
            }
            const data = await res.json();
            const reports = (data && data.reports) ? data.reports : [];

            const sel = document.getElementById("reportSelect");
            sel.innerHTML = "";

            // Prefer stable scan_report.json on top if present.
            const names = reports.map(r => r.name);
            if (names.includes("scan_report.json")) {
                const opt = document.createElement("option");
                opt.value = "scan_report.json";
                opt.innerText = "Current Execution (scan_report.json)";
                sel.appendChild(opt);
            }

            for (const r of reports) {
                if (r.name === "scan_report.json") continue;
                const opt = document.createElement("option");
                opt.value = r.name;
                opt.innerText = r.name;
                sel.appendChild(opt);
            }

            const tbody = document.getElementById("rows");
            tbody.innerHTML = "";
            const top = reports.filter(r => r.name !== "scan_report.json").slice(0, 10);
            for (const r of top) {
                const tr = document.createElement("tr");
                const date = r.scan_date ? r.scan_date : "Unknown";
                const badge = (r.findings && r.findings > 0)
                    ? `<span class="badge-threat">${r.findings}</span>`
                    : `<span class="badge-safe">0</span>`;
                tr.innerHTML = `
            <td class="mono">${escapeHtml(r.name)}</td>
            <td class="muted">${escapeHtml(date.toString().slice(0, 19))}</td>
            <td style="text-align:right;">${badge}</td>
        `;
                tbody.appendChild(tr);
            }

            setStatus(reports.length ? "Select a report to load into Dashboard." : "No reports found in `reports/`.");
        }

        async function loadSelected() {
            const sel = document.getElementById("reportSelect");
            const name = sel.value;
            if (!name) return;

            setStatus("Loading report " + name + " …");
            const res = await fetch("/reports/" + encodeURIComponent(name));
            if (!res.ok) {
                setStatus("Failed to load report: " + res.status);
                return;
            }
            const payload = await res.json();
            localStorage.setItem(LAST_SCAN_STORAGE_KEY, JSON.stringify(payload));
            setStatus("Loaded. Redirecting to Dashboard…");
            window.location.href = "/";
        }

        refresh();
    </script>
</body>

</html>
